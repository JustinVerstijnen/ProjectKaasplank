name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js (for PostCSS)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies (PostCSS, etc.)
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.0"
          extended: true

      - name: Show planned posts
        run: |
          echo "## Planned posts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Date | Title | File |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY

          python3 - <<'PY' >> $GITHUB_STEP_SUMMARY
          from pathlib import Path
          from datetime import datetime, timezone
          import re

          today = datetime.now(timezone.utc).date()
          found = False

          for path in sorted(Path("content/en/blog").glob("*.md")):
              text = path.read_text(encoding="utf-8")

              date_match = re.search(r"^date:\s*['\"]?([^'\"\n]+)['\"]?", text, re.MULTILINE)
              title_match = re.search(r"^title:\s*['\"]?([^'\"\n]+)['\"]?", text, re.MULTILINE)

              if not date_match:
                  continue

              raw_date = date_match.group(1).strip()
              post_date = datetime.fromisoformat(raw_date[:10]).date()

              if post_date > today:
                  found = True
                  title = title_match.group(1).strip() if title_match else path.stem
                  print(f"| {post_date.strftime('%d-%m-%Y')} | {title} | `{path}` |")

          if not found:
              print("| - | No planned posts found | - |")
          PY

      - name: Build site
        run: hugo --minify --gc

      - name: Sanity check build output
        run: test -f public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
