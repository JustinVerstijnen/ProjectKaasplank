  <desc id="desc">A neutral placeholder for a profile photo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4fb"/>
      <stop offset="100%" stop-color="#dbe7f6"/>
    </linearGradient>
    <linearGradient id="shape" x1="0" y1="0" x2="0" y2="1">
