{{- $command := .Get "command" | default ".\about-justin-verstijnen.ps1" -}}
{{- $content := .Inner | strings.TrimSpace -}}
{{- $rendered := .Page.RenderString $content -}}

<div class="ps-about" data-command="{{ $command }}">
  <div class="ps-terminal-wrapper" aria-live="polite">
    <div class="ps-terminal-header" aria-hidden="true">
      <div class="ps-terminal-header-left">
        <span class="ps-terminal-dot"></span>
        <span class="ps-terminal-dot"></span>
        <span class="ps-terminal-dot"></span>
      </div>
      <div class="ps-terminal-title">Windows PowerShell</div>
    </div>

    <pre class="ps-terminal-body"><span class="ps-terminal-line"><span class="ps-prompt">PS C:\Users\Justin&gt; </span><span class="ps-terminal-command"></span><span class="ps-terminal-cursor" aria-hidden="true">█</span></span><span class="ps-terminal-output"></span></pre>
  </div>

  <div class="ps-markdown about-hidden" hidden aria-hidden="true">
    {{ $rendered }}
  </div>
</div>
